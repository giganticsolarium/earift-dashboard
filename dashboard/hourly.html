<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이어리프트 AD · 시간별 히스토리</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ── CSS 변수: main/detail과 완전 통일 ── */
:root{
  --bg:#0f1117; --surface:#1a1d27; --surface2:#22263a; --surface3:#2a2f47;
  --border:#2e3250; --accent:#4f6ef7; --green:#22c55e; --red:#ef4444;
  --yellow:#f59e0b; --purple:#7c3aed; --cyan:#06b6d4; --pink:#f472b6;
  --text:#e2e8f0; --muted:#8892b0; --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI','Apple SD Gothic Neo',sans-serif;min-height:100vh;font-size:14px;}

/* ── NAV: main/detail과 동일 구조 ── */
.nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 28px;background:var(--surface);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;
}
.nav-left{display:flex;align-items:center;gap:16px;}
.logo{font-size:18px;font-weight:700;color:var(--accent);}
.page-tabs{display:flex;gap:4px;background:var(--surface2);border-radius:10px;padding:4px;}
.page-tab{
  padding:6px 16px;border-radius:7px;font-size:13px;font-weight:600;
  cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .2s;
}
.page-tab.active{background:var(--accent);color:#fff;}
.nav-right{display:flex;align-items:center;gap:10px;}
.nbadge{background:var(--surface2);border:1px solid var(--border);padding:5px 12px;border-radius:8px;font-size:12px;color:var(--muted);}
.nbadge span{color:var(--text);font-weight:600;}
.pulse{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--green);margin-right:5px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── 레이아웃 ── */
.page{max-width:1360px;margin:0 auto;padding:24px 28px;display:flex;flex-direction:column;gap:20px;}

/* ── 날짜 헤더 ── */
.date-bar{
  display:flex;align-items:center;gap:10px;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:14px 20px;flex-wrap:wrap;
}
.date-bar-title{font-size:15px;font-weight:700;flex:1;min-width:160px;}
.qbtns{display:flex;gap:5px;}
.qbtn{
  background:var(--surface2);border:1px solid var(--border);color:var(--muted);
  border-radius:20px;padding:5px 14px;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s;
}
.qbtn.active,.qbtn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
.date-nav{display:flex;align-items:center;gap:7px;}
.date-nav button{
  background:var(--surface2);border:1px solid var(--border);color:var(--text);
  border-radius:7px;padding:5px 11px;cursor:pointer;font-size:13px;transition:all .2s;
}
.date-nav button:hover{background:var(--accent);border-color:var(--accent);}
.date-display{
  font-size:15px;font-weight:700;color:var(--accent);
  min-width:80px;text-align:center;cursor:pointer;user-select:none;
  padding:4px 8px;border-radius:6px;transition:background .2s;
}
.date-display:hover{background:var(--surface2);}
.snap-count{font-size:11px;color:var(--muted);}

/* ── KPI ── */
.kpi-row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;}
@media(max-width:900px){.kpi-row{grid-template-columns:repeat(3,1fr);}}
.kpi{
  background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:16px;cursor:pointer;transition:border-color .2s;position:relative;overflow:hidden;
}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--kc,var(--accent));}
.kpi:hover,.kpi.sel{border-color:var(--accent);box-shadow:0 0 0 2px rgba(79,110,247,.18);}
.kpi-lbl{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.kpi-val{font-size:20px;font-weight:800;}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:4px;}
.up{color:var(--green);} .dn{color:var(--red);}

/* ── 섹션 공통 ── */
.sec{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px;}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.sec-title{font-size:15px;font-weight:700;}
.chart-wrap{height:240px;position:relative;}

/* ── 메트릭 토글 ── */
.mtog-row{display:flex;gap:5px;flex-wrap:wrap;}
.mtog{
  padding:4px 12px;border-radius:20px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;
}
.mtog.on{color:#fff;}
.mtog[data-m="spend"].on{background:#4f6ef7;border-color:#4f6ef7;}
.mtog[data-m="roas"].on{background:#22c55e;border-color:#22c55e;}
.mtog[data-m="revenue"].on{background:#a855f7;border-color:#a855f7;}
.mtog[data-m="purchases"].on{background:#f59e0b;border-color:#f59e0b;}
.mtog[data-m="ctr"].on{background:#06b6d4;border-color:#06b6d4;}
.mtog[data-m="cpm"].on{background:#f472b6;border-color:#f472b6;}
.axis-hint{font-size:11px;color:var(--muted);font-weight:400;margin-left:6px;}

/* ── 뷰 탭 (캠페인별 / 콘텐츠별) ── */
.view-tabs{display:flex;gap:6px;background:var(--surface2);border-radius:12px;padding:5px;max-width:320px;}
.vtab{
  flex:1;padding:7px 14px;border-radius:9px;font-size:12px;font-weight:700;
  cursor:pointer;border:none;background:transparent;color:var(--muted);
  transition:all .2s;text-align:center;
}
.vtab:hover{color:var(--text);}
.vtab.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(79,110,247,.35);}

/* ── 히트맵 ── */
.metric-tabs{display:flex;gap:2px;margin-bottom:14px;border-bottom:1px solid var(--border);overflow-x:auto;}
.mtab{padding:7px 16px;cursor:pointer;color:var(--muted);font-size:12px;font-weight:600;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;}
.mtab:hover{color:var(--text);}
.mtab.active{color:var(--accent);border-bottom-color:var(--accent);}
.heat-wrap{overflow-x:auto;}
table.heat{width:100%;border-collapse:collapse;min-width:860px;}
table.heat th{font-size:10px;color:var(--muted);padding:5px 3px;text-align:center;font-weight:600;white-space:nowrap;}
table.heat td{padding:3px;text-align:center;border-bottom:1px solid rgba(46,50,80,.4);}
.ncol{text-align:left!important;padding-left:8px!important;font-weight:600;font-size:11px;min-width:120px;max-width:150px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hc{border-radius:4px;padding:5px 2px;font-size:10px;font-weight:600;cursor:pointer;display:block;transition:transform .1s;}
.hc:hover{transform:scale(1.05);}
.h0{background:var(--surface2);color:var(--muted);}
.h1{background:rgba(79,110,247,.12);color:#8fa4fb;}
.h2{background:rgba(79,110,247,.28);color:#a5b8ff;}
.h3{background:rgba(79,110,247,.48);color:#c4d0ff;}
.h4{background:rgba(79,110,247,.70);color:#e0e8ff;}
.h5{background:#4f6ef7;color:#fff;}
.ra{background:rgba(239,68,68,.18);color:#fca5a5;}
.rb{background:rgba(245,158,11,.22);color:#fcd34d;}
.rc{background:rgba(34,197,94,.22);color:#86efac;}
.rd{background:rgba(34,197,94,.55);color:#fff;}
.cur-h{outline:2px solid var(--yellow);outline-offset:-2px;}
.total-row td{border-top:2px solid var(--border);}

/* ── 콘텐츠별 뷰 ── */
.rg{color:var(--green);font-weight:700;} .ry{color:var(--yellow);font-weight:700;} .rr{color:var(--red);font-weight:700;}

/* ── 슬라이더 & 스냅샷 ── */
.slider-row{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.slider-row label{font-size:12px;color:var(--muted);white-space:nowrap;}
input[type=range]{flex:1;accent-color:var(--accent);}
.slider-val{font-size:15px;font-weight:700;color:var(--accent);min-width:55px;}
.snap-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:700px){.snap-grid{grid-template-columns:1fr;}}
.snap-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px;}
.snap-time{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.snap-m-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:12px;}
.snap-m{background:var(--surface);border-radius:8px;padding:10px 12px;border:1px solid var(--border);}
.snap-m-lbl{font-size:10px;color:var(--muted);margin-bottom:3px;font-weight:600;}
.snap-m-val{font-size:14px;font-weight:700;}
.diff{font-size:10px;font-weight:700;padding:1px 5px;border-radius:4px;margin-left:4px;}
.diff-up{background:rgba(34,197,94,.15);color:var(--green);}
.diff-dn{background:rgba(239,68,68,.15);color:var(--red);}
.camp-list{margin-top:4px;}
.camp-row{display:flex;justify-content:space-between;font-size:11px;padding:6px 0;border-bottom:1px solid rgba(46,50,80,.5);}
.camp-row:last-child{border:none;}
.camp-name{font-weight:600;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.camp-vals{display:flex;gap:8px;}

/* ── 로딩 / 에러 ── */
.loading{text-align:center;padding:60px 20px;color:var(--muted);font-size:15px;}
.no-data{text-align:center;padding:40px;color:var(--muted);font-size:13px;}
</style>
</head>
<body>

<!-- NAV: main/detail과 동일 스타일 -->
<nav class="nav">
  <div class="nav-left">
    <div class="logo">이어리프트 AD</div>
    <div class="page-tabs">
      <button class="page-tab" onclick="location.href='main.html'">🎯 목표 현황</button>
      <button class="page-tab" onclick="location.href='detail.html'">📈 상세 데이터</button>
      <button class="page-tab active">🕐 시간별 히스토리</button>
    </div>
  </div>
  <div class="nav-right">
    <div class="nbadge">광고 계정 <span>이어리프트</span></div>
    <div class="nbadge" id="navUpdated"><span class="pulse"></span>로딩 중...</div>
  </div>
</nav>

<div class="page">

  <!-- 날짜 선택 -->
  <div class="date-bar">
    <div class="date-bar-title">🕐 시간별 광고 히스토리</div>
    <div class="qbtns" id="qbtns">
      <button class="qbtn active" onclick="quickDate(0,this)">오늘</button>
      <button class="qbtn" onclick="quickDate(1,this)">어제</button>
      <button class="qbtn" onclick="quickDate(2,this)">2일 전</button>
      <button class="qbtn" onclick="quickDate(3,this)">3일 전</button>
    </div>
    <div class="date-nav">
      <button onclick="shiftDate(-1)">◀</button>
      <div class="date-display" id="dateDisplay" onclick="openCalendar()" title="클릭하면 달력으로 날짜 선택">—</div>
      <input type="date" id="calendarInput" style="position:absolute;opacity:0;width:0;height:0;pointer-events:none;" onchange="onCalendarChange(this.value)"/>
      <button id="btnNext" onclick="shiftDate(1)">▶</button>
    </div>
    <span class="snap-count" id="snapCount"></span>
  </div>

  <!-- KPI 6개 -->
  <div class="kpi-row" id="kpiRow">
    <div class="kpi sel" style="--kc:#4f6ef7" onclick="pickMetric('spend',this)">
      <div class="kpi-lbl">총 지출</div>
      <div class="kpi-val" style="color:#4f6ef7;" id="kpi-spend">—</div>
      <div class="kpi-sub" id="kpisub-spend"></div>
    </div>
    <div class="kpi" style="--kc:#22c55e" onclick="pickMetric('roas',this)">
      <div class="kpi-lbl">ROAS</div>
      <div class="kpi-val" style="color:#22c55e;" id="kpi-roas">—</div>
      <div class="kpi-sub" id="kpisub-roas"></div>
    </div>
    <div class="kpi" style="--kc:#a855f7" onclick="pickMetric('revenue',this)">
      <div class="kpi-lbl">판매금액</div>
      <div class="kpi-val" style="color:#a855f7;" id="kpi-revenue">—</div>
      <div class="kpi-sub" id="kpisub-revenue"></div>
    </div>
    <div class="kpi" style="--kc:#f59e0b" onclick="pickMetric('purchases',this)">
      <div class="kpi-lbl">판매개수</div>
      <div class="kpi-val" style="color:#f59e0b;" id="kpi-purchases">—</div>
      <div class="kpi-sub" id="kpisub-purchases"></div>
    </div>
    <div class="kpi" style="--kc:#06b6d4" onclick="pickMetric('ctr',this)">
      <div class="kpi-lbl">CTR</div>
      <div class="kpi-val" style="color:#06b6d4;" id="kpi-ctr">—</div>
      <div class="kpi-sub" id="kpisub-ctr"></div>
    </div>
    <div class="kpi" style="--kc:#f472b6" onclick="pickMetric('cpm',this)">
      <div class="kpi-lbl">CPM</div>
      <div class="kpi-val" style="color:#f472b6;" id="kpi-cpm">—</div>
      <div class="kpi-sub" id="kpisub-cpm"></div>
    </div>
  </div>

  <!-- 시간별 성과 추이 차트 -->
  <div class="sec">
    <div class="sec-hdr">
      <span class="sec-title">⏰ 시간별 성과 지표 추이
        <span class="axis-hint" id="axisHint"></span>
      </span>
      <div class="mtog-row">
        <button class="mtog on" data-m="spend"     onclick="toggleM('spend',this)">지출</button>
        <button class="mtog on" data-m="roas"      onclick="toggleM('roas',this)">ROAS</button>
        <button class="mtog on" data-m="revenue"   onclick="toggleM('revenue',this)">판매금액</button>
        <button class="mtog"    data-m="purchases" onclick="toggleM('purchases',this)">판매개수</button>
        <button class="mtog"    data-m="ctr"       onclick="toggleM('ctr',this)">CTR</button>
        <button class="mtog"    data-m="cpm"       onclick="toggleM('cpm',this)">CPM</button>
      </div>
    </div>
    <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
  </div>

  <!-- 뷰 선택 탭 -->
  <div class="view-tabs">
    <button class="vtab active" onclick="switchView('campaign',this)">📢 캠페인별</button>
    <button class="vtab" onclick="switchView('content',this)">🎨 콘텐츠별</button>
  </div>

  <!-- ── 캠페인별 뷰 ── -->
  <div id="campaignView">
    <div class="sec">
      <div class="sec-hdr">
        <span class="sec-title">🔥 캠페인별 시간대 히트맵</span>
        <span style="font-size:11px;color:var(--muted);">노란 테두리 = 현재 시간대</span>
      </div>
      <div class="metric-tabs" id="heatTabs">
        <div class="mtab active" onclick="switchHeat('spend',this)">지출</div>
        <div class="mtab" onclick="switchHeat('roas',this)">ROAS</div>
        <div class="mtab" onclick="switchHeat('revenue',this)">판매금액</div>
        <div class="mtab" onclick="switchHeat('purchases',this)">판매개수</div>
        <div class="mtab" onclick="switchHeat('ctr',this)">CTR</div>
        <div class="mtab" onclick="switchHeat('cpm',this)">CPM</div>
      </div>
      <div class="heat-wrap">
        <table class="heat">
          <thead id="heatHead"></thead>
          <tbody id="heatBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ── 콘텐츠별 뷰 ── -->
  <div id="contentView" style="display:none;">
    <div class="sec">
      <div class="sec-hdr">
        <span class="sec-title">🎨 콘텐츠별 시간대 히트맵</span>
        <span style="font-size:11px;color:var(--muted);">노란 테두리 = 현재 시간대 · 시간별 증분값</span>
      </div>
      <div class="metric-tabs" id="adHeatTabs">
        <div class="mtab active" onclick="switchAdHeat('spend',this)">지출</div>
        <div class="mtab" onclick="switchAdHeat('roas',this)">ROAS</div>
        <div class="mtab" onclick="switchAdHeat('revenue',this)">판매금액</div>
        <div class="mtab" onclick="switchAdHeat('purchases',this)">판매개수</div>
        <div class="mtab" onclick="switchAdHeat('ctr',this)">CTR</div>
        <div class="mtab" onclick="switchAdHeat('cpm',this)">CPM</div>
      </div>
      <div class="heat-wrap">
        <table class="heat">
          <thead id="adHeatHead"></thead>
          <tbody id="adHeatBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 특정 시점 스냅샷 -->
  <div class="sec">
    <div class="sec-hdr">
      <span class="sec-title">🔍 특정 시점 스냅샷 상세</span>
    </div>
    <div class="slider-row">
      <label>시간 선택:</label>
      <input type="range" min="0" max="23" value="0" id="slider" oninput="renderSnap(+this.value)">
      <div class="slider-val" id="sliderVal">00:00</div>
    </div>
    <div class="snap-grid" id="snapArea">
      <div class="no-data">날짜를 선택하면 스냅샷이 표시됩니다.</div>
    </div>
  </div>

</div>

<script>
// ── 지표 메타 ──────────────────────────────────────────────────
const META = {
  spend:     { lbl:'지출',     color:'#4f6ef7', fmt: v => wFmt(v),            axis:'y1' },
  roas:      { lbl:'ROAS',     color:'#22c55e', fmt: v => v.toFixed(2)+'x',   axis:'y2' },
  revenue:   { lbl:'판매금액', color:'#a855f7', fmt: v => wFmt(v),            axis:'y1' },
  purchases: { lbl:'판매개수', color:'#f59e0b', fmt: v => v+'건',             axis:'y2' },
  ctr:       { lbl:'CTR',      color:'#06b6d4', fmt: v => v.toFixed(2)+'%',   axis:'y2' },
  cpm:       { lbl:'CPM',      color:'#f472b6', fmt: v => wFmt(v),            axis:'y1' },
};

function wFmt(v) {
  v = v || 0;
  if (v >= 100000000) return (v/100000000).toFixed(1)+'억';
  if (v >= 10000)     return (v/10000).toFixed(1)+'만';
  if (v >= 1000)      return (v/1000).toFixed(1)+'천';
  return Math.round(v).toLocaleString();
}

// ── 전역 상태 ──────────────────────────────────────────────────
let allSnaps = [];
let dateSnaps = [];
let selectedDate = '';
let curHeatMetric = 'spend';
let curAdHeatMetric = 'spend';
let activeMetrics = new Set(['spend','roas','revenue']);
let mainChart = null;
let currentView = 'campaign';

function buildHourMap() {
  const m = {};
  dateSnaps.forEach(s => { m[s.hour] = s; });
  return m;
}

// ── 날짜 유틸 (KST 기준) ─────────────────────────────────────
function toLocalStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function todayStr() { return toLocalStr(new Date()); }
function dateOffset(offset) {
  const d = new Date();
  d.setDate(d.getDate() - offset);
  return toLocalStr(d);
}

function quickDate(offset, btn) {
  document.querySelectorAll('.qbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  setDate(dateOffset(offset));
}

function openCalendar() {
  const cal = document.getElementById('calendarInput');
  cal.max = todayStr();
  cal.value = selectedDate || todayStr();
  cal.showPicker ? cal.showPicker() : cal.click();
}

function onCalendarChange(val) {
  if (!val) return;
  document.querySelectorAll('.qbtn').forEach(b=>b.classList.remove('active'));
  setDate(val);
}

function hideYesterdayIfTodayExists() {
  const today = todayStr();
  const todaySnapshots = allSnaps.filter(s => s.date === today);
  const yesterdayBtn = Array.from(document.querySelectorAll('.qbtn')).find(b => b.textContent.includes('어제'));
  if (todaySnapshots.length > 0 && yesterdayBtn) {
    yesterdayBtn.style.display = 'none';
  }
}

function shiftDate(delta) {
  const d = new Date(selectedDate + 'T00:00:00');
  d.setDate(d.getDate() + delta);
  const next = toLocalStr(d);
  if (next > todayStr()) return;
  document.querySelectorAll('.qbtn').forEach(b=>b.classList.remove('active'));
  setDate(next);
}

function setDate(dateStr) {
  selectedDate = dateStr;
  document.getElementById('dateDisplay').textContent = dateStr.slice(5).replace('-','/');
  const btnNext = document.getElementById('btnNext');
  if (btnNext) btnNext.style.opacity = (dateStr >= todayStr()) ? '0.3' : '1';
  dateSnaps = allSnaps.filter(s => s.date === dateStr).sort((a,b)=>a.hour-b.hour);
  document.getElementById('snapCount').textContent =
    dateSnaps.length ? `스냅샷 ${dateSnaps.length}회 수집` : '수집된 데이터 없음';

  const slider = document.getElementById('slider');
  if (dateSnaps.length) {
    slider.min = dateSnaps[0].hour;
    slider.max = dateSnaps[dateSnaps.length-1].hour;
    slider.value = dateSnaps[dateSnaps.length-1].hour;
  }

  updateKPI();
  renderChart();
  renderHeat();
  renderSnap(+slider.value);

  // 콘텐츠별 뷰가 열려있으면 업데이트
  if (currentView === 'content') renderAdHeat();
}

  document.querySelectorAll('.vtab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  document.getElementById('contentView').style.display = view === 'content' ? '' : 'none';

// ── 콘텐츠별 히트맵 메트릭 전환 ─────────────────────────────
function switchAdHeat(m, tab) {

// ── 광고 시간별 증분값 ─────────────────────────────────────
function getIncrAdVal(adMap, name, h, m) {
  const ad = (adMap[name]||{})[h];
  if (!ad) return 0;
  if (m === 'ctr' || m === 'cpm') return getCampVal(ad, m);
  let prevAd = null;
  for (let ph = h-1; ph >= 0; ph--) {
    if ((adMap[name]||{})[ph]) { prevAd = (adMap[name]||{})[ph]; break; }
  }
  if (m === 'roas') {
    const incrS = (ad.spend||0) - (prevAd ? prevAd.spend||0 : 0);
    const incrR = (ad.purchase_value||0) - (prevAd ? prevAd.purchase_value||0 : 0);
    if (incrS > 500) return Math.max(0, incrR / incrS);
    return ad.roas || 0;
  }
  const cur  = getCampVal(ad, m);
  const prev = prevAd ? getCampVal(prevAd, m) : 0;
  return Math.max(0, cur - prev);
}

// ── 콘텐츠별 히트맵 렌더 ──────────────────────────────────
function renderAdHeat() {
  const m   = curAdHeatMetric;
  const now = new Date().getHours();

  // 스냅샷에서 광고별 시간 맵 구성
  const adNames = [];
  const adMap   = {};
  dateSnaps.forEach(s => {
    (s.ads||[]).forEach(ad => {
      const key = ad.ad_name || ad.ad_id || '알수없음';
      if (!adMap[key]) { adMap[key] = {}; adNames.push(key); }
      adMap[key][s.hour] = ad;
    });
  });
  const uniqAdNames = [...new Set(adNames)];

  const head = document.getElementById('adHeatHead');
  const body = document.getElementById('adHeatBody');
  if (!head || !body) return;

  if (!uniqAdNames.length) {
    head.innerHTML = '';
    body.innerHTML = `<tr><td colspan="26" class="no-data" style="padding:30px;text-align:center;">
      ${dateSnaps.length
        ? '스냅샷에 광고 데이터가 없습니다.<br><small style="color:var(--muted)">collect_data.py 업데이트 후 수집된 스냅샷부터 콘텐츠 데이터가 포함됩니다.</small>'
        : '선택한 날짜의 데이터가 없습니다.'}
    </td></tr>`;
    return;
  }

  // 증분값 기준 색상 스케일 계산
  const allVals = [];
  uniqAdNames.forEach(n => {
    for (let h=0; h<24; h++) {
      const v = getIncrAdVal(adMap, n, h, m);
      if (v) allVals.push(v);
    }
  });
  const maxV = allVals.length ? Math.max(...allVals) : 1;
  const minV = allVals.length ? Math.min(...allVals) : 0;

  head.innerHTML = '<tr><th class="ncol" style="text-align:left">콘텐츠</th>' +
    Array.from({length:24},(_,h)=>`<th>${h}시</th>`).join('') +
    '<th style="color:var(--accent)">누적합계</th></tr>';

  body.innerHTML = '';
  const colors = ['#4f6ef7','#a855f7','#f59e0b','#22c55e','#06b6d4','#f472b6','#ec4899'];

  uniqAdNames.forEach((name, ni) => {
    const tr = document.createElement('tr');
    const shortName = name.length > 20 ? name.slice(0,20)+'…' : name;
    let html = `<td class="ncol" title="${name}">
      <span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${colors[ni%colors.length]};margin-right:5px;"></span>${shortName}
    </td>`;

    for (let h=0; h<24; h++) {
      const v     = getIncrAdVal(adMap, name, h, m);
      const isCur = (h === now);
      const cls   = heatCls(v, m, maxV, minV) + (isCur?' cur-h':'');
      const disp  = v ? META[m].fmt(v) : '-';
      html += `<td><span class="hc ${cls}" title="${h}시 증분 ${META[m].lbl}: ${disp}">${disp}</span></td>`;
    }

    // 누적합계: 해당 광고의 가장 마지막 스냅샷 값
    let latestAd = null;
    for (let hh = 23; hh >= 0; hh--) {
      if ((adMap[name]||{})[hh]) { latestAd = (adMap[name]||{})[hh]; break; }
    }
    const agg = latestAd ? META[m].fmt(getCampVal(latestAd, m)) : '-';
    html += `<td style="font-weight:700;color:${colors[ni%colors.length]};font-size:11px;border-left:1px solid var(--border);">${agg}</td>`;
    tr.innerHTML = html;
    body.appendChild(tr);
  });
}

// ── KPI ────────────────────────────────────────────────────────
function updateKPI() {
  if (!dateSnaps.length) {
    Object.keys(META).forEach(k => {
      document.getElementById('kpi-'+k).textContent = '—';
      document.getElementById('kpisub-'+k).innerHTML = '';
    });
    return;
  }
  const last = dateSnaps[dateSnaps.length-1].totals || {};
  const prev = dateSnaps.length > 1 ? (dateSnaps[dateSnaps.length-2].totals || {}) : {};

  const vals = {
    spend:     last.spend     || 0,
    roas:      last.roas      || 0,
    revenue:   last.purchase_value || 0,
    purchases: last.purchases || 0,
    ctr:       last.ctr       || 0,
    cpm:       last.cpm       || 0,
  };
  const prevVals = {
    spend:     prev.spend     || 0,
    roas:      prev.roas      || 0,
    revenue:   prev.purchase_value || 0,
    purchases: prev.purchases || 0,
    ctr:       prev.ctr       || 0,
    cpm:       prev.cpm       || 0,
  };

  Object.entries(vals).forEach(([k, v]) => {
    document.getElementById('kpi-'+k).textContent = META[k].fmt(v);
    const pv = prevVals[k];
    if (pv > 0 && v !== pv) {
      const diff = v - pv;
      const pct  = Math.abs(Math.round(diff/pv*100));
      const cls  = diff > 0 ? 'up' : 'dn';
      const arr  = diff > 0 ? '▲' : '▼';
      document.getElementById('kpisub-'+k).innerHTML =
        `<span class="${cls}">${arr}${pct}%</span> <span style="color:var(--muted)">직전 대비</span>`;
    } else {
      document.getElementById('kpisub-'+k).innerHTML = '';
    }
  });

  // 네브 업데이트 시각
  const upd = document.getElementById('navUpdated');
  if (upd && dateSnaps.length) {
    const last = dateSnaps[dateSnaps.length-1];
    upd.innerHTML = `<span class="pulse"></span><span>${selectedDate} ${String(last.hour).padStart(2,'0')}:00 기준</span>`;
  }
}

// ── 차트 ──────────────────────────────────────────────────────
function getChartData(m) {
  return Array.from({length:24}, (_, h) => {
    const s = dateSnaps.find(x => x.hour === h);
    if (!s) return null;
    const t = s.totals || {};
    const raw = {
      spend: t.spend || 0,
      roas:  t.roas  || 0,
      revenue:   t.purchase_value || 0,
      purchases: t.purchases || 0,
      ctr:  t.ctr || 0,
      cpm:  t.cpm || 0,
    }[m];
    if (META[m].axis === 'y1') return +(raw/10000).toFixed(2);
    return raw;
  });
}

function buildDatasets() {
  return [...activeMetrics].map(m => ({
    label: META[m].lbl + (META[m].axis==='y1' ? '(만원)' : ''),
    data:  getChartData(m),
    borderColor: META[m].color,
    backgroundColor: META[m].color+'22',
    yAxisID: META[m].axis,
    tension: 0.4,
    pointRadius: 4,
    pointBackgroundColor: META[m].color,
    borderWidth: 2,
    fill: false,
    spanGaps: false,
  }));
}

function updateAxisHint() {
  const y1 = [...activeMetrics].filter(m=>META[m].axis==='y1').map(m=>META[m].lbl);
  const y2 = [...activeMetrics].filter(m=>META[m].axis==='y2').map(m=>META[m].lbl);
  const parts = [];
  if (y1.length) parts.push(`왼쪽(만원): ${y1.join(', ')}`);
  if (y2.length) parts.push(`오른쪽: ${y2.join(', ')}`);
  document.getElementById('axisHint').textContent = parts.length ? '— '+parts.join(' · ') : '';
}

function renderChart() {
  const labels = Array.from({length:24}, (_,h)=>h+'시');
  const datasets = buildDatasets();

  if (mainChart) { mainChart.destroy(); mainChart = null; }
  const ctx = document.getElementById('mainChart').getContext('2d');
  mainChart = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode:'index', intersect:false },
      plugins: { legend: { labels: { color:'#8892b0', font:{size:11} } } },
      scales: {
        x:  { grid:{color:'rgba(46,50,80,.4)'}, ticks:{color:'#8892b0',font:{size:10}} },
        y1: { position:'left',  grid:{color:'rgba(46,50,80,.4)'}, ticks:{color:'#8892b0',font:{size:10}},
              title:{display:true,text:'금액 (만원)',color:'#8892b0',font:{size:10}} },
        y2: { position:'right', grid:{display:false},   ticks:{color:'#8892b0',font:{size:10}},
              title:{display:true,text:'비율(%) · 건수',color:'#8892b0',font:{size:10}} },

}

function toggleM(m, btn) {
  if (activeMetrics.has(m)) { if(activeMetrics.size>1) activeMetrics.delete(m); }
  else activeMetrics.add(m);
  btn.classList.toggle('on', activeMetrics.has(m));

function pickMetric(m, el) {

// ── 히트맵 ────────────────────────────────────────────────────
function switchHeat(m, tab) {
  curHeatMetric = m;
  document.querySelectorAll('.mtab').forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');
  renderHeat();
}

function getCampVal(camp, m) {
  if (!camp) return 0;
  return {
    spend:     camp.spend || 0,
    roas:      camp.roas  || 0,
    revenue:   camp.purchase_value || 0,
    purchases: camp.purchases || 0,
    ctr:       camp.ctr   || 0,
    cpm:       camp.cpm   || 0,
  }[m] || 0;
}

function heatCls(v, m, maxV, minV) {
  if (!v) return 'h0';
  if (m === 'roas') {
    if (v < 1.0) return 'ra'; if (v < 1.8) return 'rb';
    if (v < 2.5) return 'rc'; return 'rd';
  }
  const r = maxV > minV ? (v-minV)/(maxV-minV) : 0.5;
  if (r < 0.1) return 'h1'; if (r < 0.3) return 'h2';
  if (r < 0.55) return 'h3'; if (r < 0.8) return 'h4';
  return 'h5';
}

// 캠페인 시간별 증분값 (cumulative snapshot → incremental per-hour value)
function getIncrCampVal(campMap, name, h, m) {
  const camp = (campMap[name]||{})[h];
  if (!camp) return 0;
  // CTR/CPM은 비율 지표 → 스냅샷 값 그대로 사용
  if (m === 'ctr' || m === 'cpm') return getCampVal(camp, m);
  // 직전 데이터 포인트 찾기
  let prevCamp = null;
  for (let ph = h-1; ph >= 0; ph--) {
    if ((campMap[name]||{})[ph]) { prevCamp = (campMap[name]||{})[ph]; break; }
  }
  if (m === 'roas') {
    const incrS = (camp.spend||0) - (prevCamp ? prevCamp.spend||0 : 0);
    const incrR = (camp.purchase_value||0) - (prevCamp ? prevCamp.purchase_value||0 : 0);
    if (incrS > 500) return Math.max(0, incrR / incrS);
    return camp.roas || 0;
  }
  const cur  = getCampVal(camp, m);
  const prev = prevCamp ? getCampVal(prevCamp, m) : 0;
  return Math.max(0, cur - prev);
}

// 전체 합계행 시간별 증분값
function getIncrTotalVal(h, m) {
  const snap = dateSnaps.find(s=>s.hour===h);
  if (!snap) return 0;
  const t = snap.totals || {};
  if (m === 'ctr' || m === 'cpm') {
    return {ctr:t.ctr||0,cpm:t.cpm||0}[m];
  }
  let prevSnap = null;
  for (let ph = h-1; ph >= 0; ph--) {
    const ps = dateSnaps.find(s=>s.hour===ph);
    if (ps) { prevSnap = ps; break; }
  }
  const pt = prevSnap ? prevSnap.totals||{} : {};
  if (m === 'roas') {
    const incrS = (t.spend||0) - (pt.spend||0);
    const incrR = (t.purchase_value||0) - (pt.purchase_value||0);
    if (incrS > 500) return Math.max(0, incrR / incrS);
    return t.roas || 0;
  }
  const cv = {spend:t.spend||0,revenue:t.purchase_value||0,purchases:t.purchases||0}[m] || 0;
  const pv = {spend:pt.spend||0,revenue:pt.purchase_value||0,purchases:pt.purchases||0}[m] || 0;
  return Math.max(0, cv - pv);
}

function renderHeat() {
  const m   = curHeatMetric;
  const now = new Date().getHours();

  const campNames = [];
  const campMap   = {};
  dateSnaps.forEach(s => {
    (s.campaigns||[]).forEach(c => {

    });
  });
  const uniqNames = [...new Set(campNames)];

  // 색상 스케일은 증분값 기준으로 계산
  const allVals = [];
  uniqNames.forEach(n => {
    for (let h=0; h<24; h++) {
      const v = getIncrCampVal(campMap, n, h, m);
      if (v) allVals.push(v);
    }
  });
  const maxV = allVals.length ? Math.max(...allVals) : 1;
  const minV = allVals.length ? Math.min(...allVals) : 0;

  const head = document.getElementById('heatHead');
  head.innerHTML = '<tr><th class="ncol" style="text-align:left">캠페인</th>' +
    Array.from({length:24},(_,h)=>`<th>${h}시</th>`).join('') + '<th style="color:var(--accent)">누적합계</th></tr>';

  const body = document.getElementById('heatBody');
  body.innerHTML = '';

  if (!uniqNames.length) {
    body.innerHTML = '<tr><td colspan="26" class="no-data">선택한 날짜의 데이터가 없습니다.</td></tr>';
    return;
  }

  const colors = ['#4f6ef7','#a855f7','#f59e0b','#22c55e','#06b6d4','#f472b6','#ec4899'];
  uniqNames.forEach((name, ni) => {
    const tr = document.createElement('tr');
    let html = `<td class="ncol" title="${name}"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${colors[ni%colors.length]};margin-right:5px;"></span>${name.length>18?name.slice(0,18)+'…':name}</td>`;

    for (let h=0; h<24; h++) {
      const v     = getIncrCampVal(campMap, name, h, m);
      const isCur = (h === now);
      const cls   = heatCls(v, m, maxV, minV) + (isCur?' cur-h':'');
      const disp  = v ? META[m].fmt(v) : '-';
      html += `<td><span class="hc ${cls}" title="${h}시 증분 ${META[m].lbl}: ${disp}">${disp}</span></td>`;
    }

    // 누적합계: 해당 캠페인의 가장 마지막 스냅샷 값
    let latestCamp = null;
    for (let hh = 23; hh >= 0; hh--) {
      if ((campMap[name]||{})[hh]) { latestCamp = (campMap[name]||{})[hh]; break; }
    }
    const agg = latestCamp ? META[m].fmt(getCampVal(latestCamp, m)) : '-';
    html += `<td style="font-weight:700;color:${colors[ni%colors.length]};font-size:11px;border-left:1px solid var(--border);">${agg}</td>`;
    tr.innerHTML = html;
    body.appendChild(tr);
  });

  // 전체 합계 행
  const tr2 = document.createElement('tr');
  tr2.className = 'total-row';
  let html2 = `<td class="ncol" style="color:var(--accent);">▶ 전체</td>`;
  for (let h=0; h<24; h++) {
    const v    = getIncrTotalVal(h, m);
    const disp = v ? META[m].fmt(v) : '-';
    html2 += `<td style="font-size:10px;font-weight:700;color:var(--accent);">${disp}</td>`;
  }
  // 전체 누적합계: 가장 마지막 스냅샷의 totals 값
  const lastSnap = dateSnaps.length ? dateSnaps[dateSnaps.length-1] : null;
  let totAgg = '-';
  if (lastSnap) {
    const t = lastSnap.totals || {};
    const v = {spend:t.spend||0,roas:t.roas||0,revenue:t.purchase_value||0,purchases:t.purchases||0,ctr:t.ctr||0,cpm:t.cpm||0}[m];
    totAgg = META[m].fmt(v);
  }
  html2 += `<td style="font-weight:700;color:var(--accent);font-size:11px;border-left:1px solid var(--border);">${totAgg}</td>`;
  tr2.innerHTML = html2;
  body.appendChild(tr2);
}

// ── 스냅샷 상세 ────────────────────────────────────────────────
function renderSnap(h) {
  document.getElementById('sliderVal').textContent = String(h).padStart(2,'0')+':00';
  const snap     = dateSnaps.find(s=>s.hour===h);
  const prevSnap = dateSnaps.find(s=>s.hour===h-1);

  function mkCard(s, label) {
    if (!s) return `<div class="snap-card"><div class="snap-time">${label}</div><div class="no-data" style="padding:20px 0;">해당 시간 수집된 데이터 없음</div></div>`;
    const t = s.totals || {};
    const vals = {spend:t.spend||0,roas:t.roas||0,revenue:t.purchase_value||0,purchases:t.purchases||0,ctr:t.ctr||0,cpm:t.cpm||0};

    function diffBadge(k, pSnap) {
      if (!pSnap) return '';
      const pt = pSnap.totals || {};
      const pv = {spend:pt.spend||0,roas:pt.roas||0,revenue:pt.purchase_value||0,purchases:pt.purchases||0,ctr:pt.ctr||0,cpm:pt.cpm||0}[k];
      const cv = vals[k];
      if (!pv || cv===pv) return '';
      const d   = cv - pv;
      const pct = Math.abs(Math.round(d/pv*100));
      const cls = d>0?'diff-up':'diff-dn';
      return `<span class="diff ${cls}">${d>0?'▲':'▼'}${pct}%</span>`;
    }

    const mHtml = Object.entries(META).map(([k,mt])=>
      `<div class="snap-m">
        <div class="snap-m-lbl">${mt.lbl}</div>
        <div class="snap-m-val" style="color:${mt.color};">${mt.fmt(vals[k])}${label.includes('선택')?diffBadge(k,prevSnap):''}</div>
      </div>`
    ).join('');

    const campHtml = (s.campaigns||[]).slice(0,5).map((c,i)=>{
      const clr = ['#4f6ef7','#a855f7','#f59e0b','#22c55e','#06b6d4'][i%5];
      const nm  = (c.campaign_name||'').length>16?(c.campaign_name||'').slice(0,16)+'…':c.campaign_name||'-';
      return `<div class="camp-row">
        <span class="camp-name" style="color:${clr};" title="${c.campaign_name||''}">${nm}</span>
        <span class="camp-vals">
          <span style="color:#4f6ef7;">${wFmt(c.spend||0)}</span>
          <span style="color:#22c55e;">ROAS ${(c.roas||0).toFixed(2)}x</span>
          <span style="color:#a855f7;">${wFmt(c.purchase_value||0)}</span>
          <span style="color:#f59e0b;">${c.purchases||0}건</span>
          <span style="color:#f472b6;">CPM ${wFmt(c.cpm||0)}</span>
        </span>
      </div>`;
    }).join('') || '<div class="no-data" style="padding:8px 0;font-size:11px;">캠페인 데이터 없음</div>';

    return `<div class="snap-card">
      <div class="snap-time">${String(s.hour).padStart(2,'0')}:00 스냅샷
        <span style="font-size:11px;color:var(--muted);font-weight:400;">${label}</span>
      </div>
      <div class="snap-m-grid">${mHtml}</div>
      <div style="font-size:11px;color:var(--muted);margin:6px 0 4px;font-weight:600;">캠페인별 상세</div>
      <div class="camp-list">${campHtml}</div>
    </div>`;
  }

  document.getElementById('snapArea').innerHTML =
    mkCard(snap, '(선택 시간)') + mkCard(prevSnap, '(직전 시간 비교)');
}

// ── 데이터 로드 ────────────────────────────────────────────────
async function loadData() {
  try {
    const base = location.pathname.includes('/dashboard/') ? '../' : './';
    const jsonH = await fetch(base + 'data/hourly_snapshots.json?t=' + Date.now()).then(r => {
      if (!r.ok) throw new Error('fetch failed');
      return r.json();
    });
    allSnaps = jsonH.snapshots || [];
    hideYesterdayIfTodayExists();
    const today = toLocalStr(new Date()); // KST 기준 오늘
    setDate(today);
    if (currentView === 'content') renderAdHeat();
  } catch(e) {
    document.querySelector('.page').innerHTML =
      `<div class="loading">⚠️ 데이터를 불러올 수 없습니다.<br><small style="color:var(--muted)">hourly_snapshots.json이 아직 생성되지 않았거나 네트워크 오류입니다.<br>다음 정각 이후에 다시 확인해 주세요.</small></div>`;
  }
}

loadData();
</script>
