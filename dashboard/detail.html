<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이어리프트 AD · 상세 데이터</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --surface3: #2a2f47;
      --border: #2e3250;
      --accent: #4f6ef7;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #f59e0b;
      --cyan: #06b6d4;
      --purple: #7c3aed;
      --pink: #f472b6;
      --text: #e2e8f0;
      --muted: #8892b0;
      --card-radius: 14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI','Apple SD Gothic Neo',sans-serif; min-height: 100vh; }

    /* ── NAV ── */
    .nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 28px; background: var(--surface);
      border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
    }
    .nav-left { display: flex; align-items: center; gap: 16px; }
    .logo { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: -.5px; }
    .page-tabs { display: flex; gap: 4px; background: var(--surface2); border-radius: 10px; padding: 4px; }
    .page-tab {
      padding: 6px 16px; border-radius: 7px; font-size: 13px; font-weight: 600;
      cursor: pointer; border: none; background: transparent; color: var(--muted); transition: all .2s;
    }
    .page-tab.active { background: var(--accent); color: #fff; }
    .platform-tabs { display: flex; gap: 6px; }
    .ptab {
      padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
      cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--muted); transition: all .2s;
    }
    .ptab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .ptab.soon { opacity: .4; cursor: not-allowed; }
    .nav-right { display: flex; align-items: center; gap: 10px; }
    .nbadge {
      background: var(--surface2); border: 1px solid var(--border);
      padding: 5px 12px; border-radius: 8px; font-size: 12px; color: var(--muted);
    }
    .nbadge span { color: var(--text); font-weight: 600; }
    .pulse { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--green); margin-right: 5px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── DATE BAR ── */
    .date-bar {
      display: flex; align-items: center; gap: 8px; padding: 12px 28px;
      background: var(--surface); border-bottom: 1px solid var(--border);
    }
    .dbtn {
      padding: 5px 14px; border-radius: 20px; font-size: 12px; font-weight: 600;
      cursor: pointer; border: 1px solid var(--border); background: transparent;
      color: var(--muted); transition: all .2s;
    }
    .dbtn.active { background: var(--surface2); color: var(--text); border-color: var(--accent); }
    .dsep { color: var(--border); }
    .date-input {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); padding: 4px 10px; font-size: 12px; cursor: pointer;
      color-scheme: dark;
    }
    .date-input:focus { outline: none; border-color: var(--accent); }
    .date-label { color: var(--muted); font-size: 12px; }

    /* ── MAIN ── */
    .main { padding: 24px 28px; display: flex; flex-direction: column; gap: 24px; }

    /* ── LOADING ── */
    .loading { display: flex; align-items: center; justify-content: center; min-height: 60vh; font-size: 15px; color: var(--muted); flex-direction: column; gap: 12px; }

    /* ── KPI ── */
    .kpi-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 14px; }
    .kpi-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--card-radius); padding: 20px;
      position: relative; overflow: hidden; cursor: pointer; transition: border-color .2s;
    }
    .kpi-card:hover { border-color: var(--accent); }
    .kpi-card.selected { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(79,110,247,.22); }
    .kpi-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background: var(--ca, var(--accent)); }
    .kpi-card:nth-child(1){--ca:#4f6ef7} .kpi-card:nth-child(2){--ca:#7c3aed}
    .kpi-card:nth-child(3){--ca:#f59e0b} .kpi-card:nth-child(4){--ca:#22c55e}
    .kpi-card:nth-child(5){--ca:#f472b6}
    .kpi-label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
    .kpi-value { font-size: 28px; font-weight: 700; margin: 8px 0 4px; }
    .kpi-sub { font-size: 12px; display: flex; align-items: center; gap: 4px; }
    .up{color:var(--green)} .dn{color:var(--red)} .nt{color:var(--muted)}
    .sel-dot { position:absolute; top:14px; right:14px; width:8px; height:8px; border-radius:50%; background:var(--ca,var(--accent)); display:none; }
    .kpi-card.selected .sel-dot { display:block; }

    /* ── CHART ── */
    .chart-section { background:var(--surface); border:1px solid var(--border); border-radius:var(--card-radius); padding:22px; }
    .sec-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:10px; }
    .sec-title { font-size:15px; font-weight:700; }
    .metric-toggles { display:flex; gap:8px; flex-wrap:wrap; }
    .mtog {
      padding:4px 12px; border-radius:20px; font-size:11px; font-weight:600;
      cursor:pointer; border:1px solid var(--border); background:transparent; color:var(--muted); transition:all .2s;
    }
    .mtog.on { color:#fff; }
    .mtog[data-m="roas"].on{background:#4f6ef7;border-color:#4f6ef7}
    .mtog[data-m="cpa"].on{background:#7c3aed;border-color:#7c3aed}
    .mtog[data-m="spend"].on{background:#f59e0b;border-color:#f59e0b}
    .mtog[data-m="ctr"].on{background:#22c55e;border-color:#22c55e}
    .mtog[data-m="cpm"].on{background:#f472b6;border-color:#f472b6}
    .mtog[data-m="imp"].on{background:#06b6d4;border-color:#06b6d4}
    .mtog[data-m="click"].on{background:#ec4899;border-color:#ec4899}
    .chart-wrap { position:relative; height:260px; }

    /* ── TIME SPEND ── */
    .time-spend-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .ts-section { background:var(--surface); border:1px solid var(--border); border-radius:var(--card-radius); padding:22px; }
    .ts-table { width:100%; border-collapse:collapse; font-size:12px; }
    .ts-table th {
      padding:8px 10px; color:var(--muted); font-size:10px; font-weight:700;
      text-transform:uppercase; letter-spacing:.4px; border-bottom:1px solid var(--border); text-align:center;
    }
    .ts-table th.name-col { text-align:left; min-width:130px; }
    .ts-table td { padding:10px 10px; border-bottom:1px solid rgba(46,50,80,.4); text-align:center; vertical-align:middle; }
    .ts-table td.name-col { text-align:left; }
    .ts-table tr:last-child td { border-bottom:none; }
    .ts-table tr:hover td { background:var(--surface2); }
    .camp-name { font-size:12px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:140px; display:block; cursor:default; }
    .camp-total { font-size:10px; color:var(--muted); margin-top:2px; }
    .spend-cell { position:relative; }
    .spend-cell .cell-val { font-size:12px; font-weight:700; color:var(--text); }
    .spend-cell .cell-sub { font-size:10px; color:var(--muted); }
    .spend-cell .cell-sub2 { font-size:10px; color:var(--muted); margin-top:1px; }
    .spend-cell .cell-sub2 .rg { color:#22c55e; } .spend-cell .cell-sub2 .ry { color:#f59e0b; } .spend-cell .cell-sub2 .rr { color:#ef4444; }
    .spend-cell.current-slot { background:rgba(79,110,247,.07); }
    .spend-cell.current-slot .cell-val { color:var(--accent); }

    /* ── TABLE ── */
    .table-section { background:var(--surface); border:1px solid var(--border); border-radius:var(--card-radius); padding:22px; }
    .table-wrap { overflow-x:auto; margin-top:14px; }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th { text-align:left; padding:8px 12px; color:var(--muted); font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.5px; border-bottom:1px solid var(--border); }
    td { padding:12px 12px; border-bottom:1px solid rgba(46,50,80,.5); }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:var(--surface2); }
    .sdot { display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:6px; }
    .son{background:var(--green)} .soff{background:var(--muted)}
    .rg{color:var(--green);font-weight:700} .ry{color:var(--yellow);font-weight:700} .rr{color:var(--red);font-weight:700}

    /* ── PLATFORM SOON ── */
    .soon-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .soon-banner {
      background:var(--surface); border:1px dashed var(--border);
      border-radius:var(--card-radius); padding:16px 20px;
      display:flex; align-items:center; justify-content:center; gap:10px;
      color:var(--muted); font-size:13px;
    }
    .badge-soon { background:var(--surface2); border:1px solid var(--border); border-radius:6px; padding:3px 8px; font-size:11px; font-weight:700; color:var(--yellow); }

    /* ── TOOLTIP ── */
    [title] { cursor: default; }
  </style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-left">
    <div class="logo">이어리프트 AD</div>
    <div class="page-tabs">
      <button class="page-tab" onclick="location.href='main.html'">🎯 목표 현황</button>
      <button class="page-tab active">📈 상세 데이터</button>
      <button class="page-tab" onclick="location.href='hourly.html'">🕐 시간별 히스토리</button>
    </div>
    <div class="platform-tabs">
      <button class="ptab active">Meta</button>
      <button class="ptab soon">카카오 (준비중)</button>
      <button class="ptab soon">TikTok (준비중)</button>
    </div>
  </div>
  <div class="nav-right">
    <button class="goal-btn" onclick="openActivityModal()">📋 운영 이력</button>
    <div class="nbadge">광고 계정 <span>이어리프트</span></div>
    <div class="nbadge" id="last-updated"><span class="pulse"></span>로딩 중...</div>
  </div>
</nav>

<!-- DATE BAR -->
<div class="date-bar">
  <button class="dbtn active" data-period="today"      onclick="selectPeriod('today',this)">오늘</button>
  <button class="dbtn"        data-period="yesterday"  onclick="selectPeriod('yesterday',this)">어제</button>
  <button class="dbtn"        data-period="this_week"  onclick="selectPeriod('this_week',this)">이번 주</button>
  <button class="dbtn"        data-period="last_week"  onclick="selectPeriod('last_week',this)">저번 주</button>
  <button class="dbtn"        data-period="month"      onclick="selectPeriod('month',this)">이번 달</button>
  <button class="dbtn"        data-period="last_month" onclick="selectPeriod('last_month',this)">저번 달</button>
  <button class="dbtn"        data-period="7d"         onclick="selectPeriod('7d',this)">최근 7일</button>
  <span class="dsep">|</span>
  <span class="date-label">직접 선택</span>
  <input type="date" id="date-from" class="date-input">
  <span class="date-label">~</span>
  <input type="date" id="date-to" class="date-input">
  <button class="dbtn" onclick="applyCustomRange()">적용</button>
</div>

<div id="main-content" class="main">
  <div class="loading">⏳ 데이터 불러오는 중...</div>
</div>

<script>
const REPO = 'giganticsolarium/earift-dashboard';
const RAW  = `https://raw.githubusercontent.com/${REPO}/main/data`;
const campColors = ['#4f6ef7','#7c3aed','#f59e0b','#22c55e','#06b6d4','#f472b6'];
// localStorage에서 목표 읽기 (main.html의 ⚙️ 설정과 공유)
const GOALS_KEY = 'earift_goals_v1';
function getStoredGoals() {
  try { const s = localStorage.getItem(GOALS_KEY); return s ? JSON.parse(s) : null; } catch(e) { return null; }
}

let mainChart = null;
let activeMetrics = ['roas','cpa','spend'];
let currentPeriod = 'today';
let customStart = '', customEnd = '';
let adsSortKey = 'spend';
let adsSortDir = 'desc';
let _adsCache = [];
let _adsGoals = null;

// ── hourly_snapshots.json에서 전날 데이터 숨김 ──────────────────────────────────────────────
async function checkAndHideYesterdayData() {
  try {
    const r = await fetch(`${RAW}/hourly_snapshots.json?t=${Date.now()}`);
    const json = await r.json();
    const snapshots = json.snapshots || [];
    const now = new Date();
    const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
    const todaySnapshots = snapshots.filter(s => s.date === todayStr);
    const yesterdayBtn = document.querySelector('.dbtn[data-period="yesterday"]');
    if (todaySnapshots.length > 0 && yesterdayBtn) {
      yesterdayBtn.style.display = 'none';
    }
  } catch(e) {}
}

// ── 기간 헬퍼 ────────────────────────────────────────────────────────────────
function getPeriodDatesDetail(p) {
  const now = new Date();
  const y = now.getFullYear(), mo = now.getMonth(), da = now.getDate();
  const fmt = dt => `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
  const today = fmt(now);
  switch(p) {
    case 'this_week': {
      const dow = now.getDay(), diff = dow === 0 ? -6 : 1 - dow;
      return { start: fmt(new Date(y, mo, da + diff)), end: today };
    }
    case 'last_week': {
      const dow = now.getDay(), diff = dow === 0 ? -6 : 1 - dow;
      const thisMon = new Date(y, mo, da + diff);
      return { start: fmt(new Date(thisMon.getTime() - 7*86400000)), end: fmt(new Date(thisMon.getTime() - 86400000)) };
    }
    case 'last_month': {
      const lm = mo === 0 ? 11 : mo - 1, ly = mo === 0 ? y - 1 : y;
      return { start: fmt(new Date(ly, lm, 1)), end: fmt(new Date(y, mo, 0)) };
    }
    case 'month': return { start: fmt(new Date(y, mo, 1)), end: today };
    default:       return { start: today, end: today };
  }
}

function selectPeriod(period, btn) {
  currentPeriod = period;
  document.querySelectorAll('.dbtn[data-period]').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  if (window._lastData) render(window._lastData.s, window._lastData.d, window._lastData.c, window._lastData.a, window._lastData.h, window._lastData.p, window._lastData.g);
}

function applyCustomRange() {
  const from = document.getElementById('date-from').value;
  const to   = document.getElementById('date-to').value;
  if (!from || !to) { alert('날짜를 선택해 주세요.'); return; }
  if (from > to)    { alert('시작일이 종료일보다 늦을 수 없습니다.'); return; }
  customStart = from;
  customEnd   = to;
  selectPeriod('custom', null);
}

function aggregateDays(rows) {
  if (!rows || !rows.length) return {};
  const spend          = rows.reduce((a, x) => a + (x.spend||0), 0);
  const purchases      = rows.reduce((a, x) => a + (x.purchases||0), 0);
  const purchase_value = rows.reduce((a, x) => a + (x.purchase_value||0), 0);
  const impressions    = rows.reduce((a, x) => a + (x.impressions||0), 0);
  const clicks         = rows.reduce((a, x) => a + (x.clicks||0), 0);
  const roas = spend > 0 ? Math.round(purchase_value / spend * 100) / 100 : 0;
  const cpa  = purchases > 0 ? Math.round(spend / purchases) : 0;
  const ctr  = impressions > 0 ? Math.round(clicks / impressions * 10000) / 100 : 0;
  const cpm  = impressions > 0 ? Math.round(spend / impressions * 1000) : 0;
  return { spend, purchases, purchase_value, impressions, clicks, roas, cpa, ctr, cpm };
}

function getKpiForPeriod(s, d) {
  const allData = (d && d.data) || [];
  const now = new Date();
  const thisMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  switch (currentPeriod) {
    case 'today':
      return { cur: s.today||{}, prev: s.yesterday||{}, label: 'vs 어제' };
    case 'yesterday':
      return { cur: s.yesterday||{}, prev: {}, label: '' };
    case '7d': {
      const cur  = s.last_7d || aggregateDays(allData.slice(-7));
      const prev = aggregateDays(allData.slice(-14, -7));
      return { cur, prev, label: 'vs 이전 7일' };
    }
    case '30d': {
      const cur  = aggregateDays(allData.slice(-30));
      const prev = aggregateDays(allData.slice(-60, -30));
      return { cur, prev, label: 'vs 이전 30일' };
    }
    case 'month': {
      // summary.monthly = Meta API this_month 직접 호출값 → 가장 정확한 소스
      const cur = s.monthly || s.month || {};
      return { cur, prev: {}, label: '' };
    }
    case 'this_week': {
      const { start, end } = getPeriodDatesDetail('this_week');
      const { start: lwS, end: lwE } = getPeriodDatesDetail('last_week');
      const curRows  = allData.filter(x => x.date >= start && x.date <= end);
      const prevRows = allData.filter(x => x.date >= lwS   && x.date <= lwE);
      return { cur: aggregateDays(curRows), prev: aggregateDays(prevRows), label: 'vs 저번 주' };
    }
    case 'last_week': {
      const { start, end } = getPeriodDatesDetail('last_week');
      const { start: twS, end: twE } = getPeriodDatesDetail('this_week');
      const curRows  = allData.filter(x => x.date >= start && x.date <= end);
      const prevRows = allData.filter(x => x.date >= twS   && x.date <= twE);
      return { cur: aggregateDays(curRows), prev: aggregateDays(prevRows), label: 'vs 이번 주' };
    }
    case 'last_month': {
      const { start, end } = getPeriodDatesDetail('last_month');
      const { start: tmS, end: tmE } = getPeriodDatesDetail('month');
      const curRows  = allData.filter(x => x.date >= start && x.date <= end);
      const prevRows = allData.filter(x => x.date >= tmS   && x.date <= tmE);
      return { cur: aggregateDays(curRows), prev: aggregateDays(prevRows), label: 'vs 이번 달' };
    }
    case 'custom': {
      const curRows = allData.filter(x => x.date >= customStart && x.date <= customEnd);
      return { cur: aggregateDays(curRows), prev: {}, label: `${customStart.slice(5)} ~ ${customEnd.slice(5)}` };
    }
    default:
      return { cur: s.today||{}, prev: s.yesterday||{}, label: 'vs 어제' };
  }
}

function getChartDays(d) {
  const allData = (d && d.data) || [];
  const now = new Date();
  const thisMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  switch (currentPeriod) {
    case 'today':
    case 'yesterday': return allData.slice(-14);
    case '7d':        return allData.slice(-7);
    case '30d':       return allData.slice(-30);
    case 'month':     return allData.filter(x => x.date && x.date.startsWith(thisMonth));
    case 'this_week': { const { start, end } = getPeriodDatesDetail('this_week'); return allData.filter(x => x.date >= start && x.date <= end); }
    case 'last_week': { const { start, end } = getPeriodDatesDetail('last_week'); return allData.filter(x => x.date >= start && x.date <= end); }
    case 'last_month': { const { start, end } = getPeriodDatesDetail('last_month'); return allData.filter(x => x.date >= start && x.date <= end); }
    case 'custom':    return allData.filter(x => x.date >= customStart && x.date <= customEnd);
    default:          return allData.slice(-14);
  }
}

function groupByWeek(rows) {
  const weeks = {};
  rows.forEach(r => {
    const d = new Date(r.date);
    const mon = new Date(d); mon.setDate(d.getDate() - d.getDay() + 1);
    const key = mon.toISOString().slice(5, 10);
    if (!weeks[key]) weeks[key] = [];
    weeks[key].push(r);
  });
  return Object.entries(weeks).map(([label, rs]) => ({ label, ...aggregateDays(rs) }));
}

function wFmt(n) {
  n = Math.round(+n || 0);
  if (n >= 100000000) { const v = n/100000000; return (v%1===0?v:v.toFixed(1))+'억원'; }
  if (n >= 10000)     return Math.round(n/10000).toLocaleString()+'만원';
  return n.toLocaleString()+'원';
}

function render(s, d, c, a, h, p, g) {
  window._lastData = {s, d, c, a, h, p, g};
  const {cur: today, prev: yesterday, label: periodLabel} = getKpiForPeriod(s, d);
  // 기간에 맞는 캠페인 데이터 선택
  const periodCampData = {
    this_week:  (p && Array.isArray(p.this_week))  ? p.this_week  : null,
    last_week:  (p && Array.isArray(p.last_week))  ? p.last_week  : null,
    last_month: (p && Array.isArray(p.last_month)) ? p.last_month : null,
  };
  const camps = periodCampData[currentPeriod] !== null && periodCampData[currentPeriod] !== undefined
    ? periodCampData[currentPeriod]
    : (c && (c.data || c.campaigns)) || s.campaigns || [];
  const campPeriodLabel = { today:'오늘 (이번 달 기준)', yesterday:'어제 (이번 달 기준)',
    this_week:'이번 주', last_week:'저번 주', month:'이번 달', last_month:'저번 달',
    '7d':'최근 7일 (이번 달 기준)', '30d':'최근 30일 (이번 달 기준)',
    custom: customStart ? `${customStart} ~ ${customEnd}` : '직접 선택 (이번 달 기준)'
  }[currentPeriod] || '이번 달';
  const ads = (a && a.data) || [];
  // localStorage 우선 → goals.json(g) → summary.json(s.goals) → 하드코딩 기본값
  const goals = getStoredGoals() || g || s.goals || { budget: 3000000, roas: 2.5, revenue: 7500000, spend: 3000000 };

  function delta(cur, prev, isRoas) {
    const diff = (cur||0) - (prev||0);
    if (diff === 0) return '';
    const sign  = diff > 0 ? '▲' : '▼';
    const cls   = diff > 0 ? 'up' : 'dn';
    const val   = isRoas ? Math.abs(diff).toFixed(2) : wFmt(Math.abs(diff));
    return `<span class="${cls}">${sign} ${val}</span>`;
  }

  // ── 성과 추이 차트 데이터 (오늘 → 시간별 누적, 그 외 → 일별) ──────────────
  function aggregateSnap(snap) {
    const cs = snap.campaigns || [];
    const spend          = cs.reduce((a, c) => a + (c.spend||0), 0);
    const impressions    = cs.reduce((a, c) => a + (c.impressions||0), 0);
    const clicks         = cs.reduce((a, c) => a + (c.clicks||0), 0);
    const purchases      = cs.reduce((a, c) => a + (c.purchases||0), 0);
    const purchase_value = cs.reduce((a, c) => a + (c.purchase_value||0), 0);
    const roas = spend > 0 ? Math.round(purchase_value / spend * 100) / 100 : 0;
    const cpa  = purchases > 0 ? Math.round(spend / purchases) : 0;
    const ctr  = impressions > 0 ? Math.round(clicks / impressions * 10000) / 100 : 0;
    const cpm  = impressions > 0 ? Math.round(spend / impressions * 1000) : 0;
    return { spend, impressions, clicks, purchases, purchase_value, roas, cpa, ctr, cpm };
  }

  const _chartNow = new Date();
  const _chartTodayStr = `${_chartNow.getFullYear()}-${String(_chartNow.getMonth()+1).padStart(2,'0')}-${String(_chartNow.getDate()).padStart(2,'0')}`;
  const _todaySnapsForChart = ((h && h.snapshots) || [])
    .filter(sn => sn.date === _chartTodayStr)
    .sort((a, b) => a.hour - b.hour);
  const _useHourly = (currentPeriod === 'today' && _todaySnapsForChart.length > 0);

  let labels, dsRoas, dsCpa, dsSpend, dsImp, dsClick, dsCtr, dsCpm;
  if (_useHourly) {
    labels  = _todaySnapsForChart.map(sn => `${String(sn.hour).padStart(2,'0')}:00`);
    const snAgg = _todaySnapsForChart.map(sn => aggregateSnap(sn));
    dsRoas  = snAgg.map(x => x.roas);
    dsCpa   = snAgg.map(x => Math.round(x.cpa / 1000));
    dsSpend = snAgg.map(x => Math.round(x.spend / 10000));
    dsImp   = snAgg.map(x => Math.round(x.impressions / 1000));
    dsClick = snAgg.map(x => Math.round(x.clicks / 100) * 100 / 1000);
    dsCtr   = snAgg.map(x => x.ctr);
    dsCpm   = snAgg.map(x => Math.round(x.cpm / 1000));
  } else {
    const dailyArr = getChartDays(d);
    labels  = dailyArr.map(x => (x.date||'').slice(5));
    dsRoas  = dailyArr.map(x => x.roas||0);
    dsCpa   = dailyArr.map(x => Math.round((x.cpa||0)/1000));
    dsSpend = dailyArr.map(x => Math.round((x.spend||0)/10000));
    dsImp   = dailyArr.map(x => Math.round((x.impressions||0)/1000));
    dsClick = dailyArr.map(x => Math.round((x.clicks||0)/100)*100/1000);
    dsCtr   = dailyArr.map(x => x.ctr||0);
    dsCpm   = dailyArr.map(x => Math.round((x.cpm||0)/1000));
  }

  const dsMap = {
    roas:  { label:'ROAS',        data: dsRoas,  color:'#4f6ef7', y:'y1' },
    cpa:   { label:'CPA(천원)',   data: dsCpa,   color:'#7c3aed', y:'y1' },
    spend: { label:'지출(만원)',  data: dsSpend, color:'#f59e0b', y:'y2' },
    ctr:   { label:'CTR(%)',      data: dsCtr,   color:'#22c55e', y:'y1' },
    cpm:   { label:'CPM(천원)',   data: dsCpm,   color:'#f472b6', y:'y1' },
    imp:   { label:'노출(천)',    data: dsImp,   color:'#06b6d4', y:'y2' },
    click: { label:'클릭(천)',    data: dsClick, color:'#ec4899', y:'y1' },
  };

  // 캠페인 테이블 행
  const campRows = camps.length > 0
    ? camps.map(c => {
        const roasCls = c.roas >= (goals.roas||2.5) ? 'rg' : c.roas >= 1.5 ? 'ry' : 'rr';
        const cpaCls  = c.cpa < 50000 ? 'rg' : c.cpa < 100000 ? 'ry' : 'rr';
        return `<tr>
          <td>${c.campaign_name||'-'}</td>
          <td><span class="sdot son"></span>활동 중</td>
          <td>${(c.impressions||0).toLocaleString()}</td>
          <td>${(c.clicks||0).toLocaleString()}</td>
          <td>${((c.ctr||0)).toFixed(1)}%</td>
          <td>${wFmt(c.cpm||0)}</td>
          <td>${wFmt(c.spend||0)}</td>
          <td>${c.purchases||0}</td>
          <td class="${cpaCls}">${wFmt(c.cpa||0)}</td>
          <td class="${roasCls}">${(c.roas||0).toFixed(2)}x</td>
        </tr>`;
      }).join('')
    : `<tr><td colspan="10" style="color:var(--muted);text-align:center;padding:20px;">캠페인 데이터가 없습니다.</td></tr>`;

  // ── 오늘 실제 시간별 광고비 - 4슬롯 디자인 (hourly_snapshots.json 기반) ──────────────────
  const now = new Date();
  const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  const allSnaps = (h && h.snapshots) || [];
  const todaySnaps = allSnaps.filter(s => s.date === todayStr).sort((a,b) => a.hour - b.hour);

  // 캠페인별 시간 데이터 맵 구성
  const campHourMap = {};
  const campNamesInSnaps = [];
  todaySnaps.forEach(snap => {
    (snap.campaigns || []).forEach(c => {
      if (!campHourMap[c.campaign_name]) {
        campHourMap[c.campaign_name] = {};
        campNamesInSnaps.push(c.campaign_name);
      }
      campHourMap[c.campaign_name][snap.hour] = c;
    });
  });
  const uniqCampNames = [...new Set(campNamesInSnaps)];

  // 4 슬롯 정의
  const slotDefs = [
    { name: '00~06시', start: 0, end: 5 },
    { name: '06~12시', start: 6, end: 11 },
    { name: '12~18시', start: 12, end: 17 },
    { name: '18~24시', start: 18, end: 23 },
  ];
  const currentHour = now.getHours();
  const currentSlotIdx = slotDefs.findIndex(s => currentHour >= s.start && currentHour <= s.end);

  // 슬롯별 캠페인 증분 데이터 계산
  function getSlotData(campName, slot) {
    let snapAtEnd = null;
    for (let hh = slot.end; hh >= slot.start; hh--) {
      if ((campHourMap[campName]||{})[hh]) { snapAtEnd = (campHourMap[campName]||{})[hh]; break; }
    }
    if (!snapAtEnd) return null;
    let snapBefore = null;
    for (let hh = slot.start - 1; hh >= 0; hh--) {
      if ((campHourMap[campName]||{})[hh]) { snapBefore = (campHourMap[campName]||{})[hh]; break; }
    }
    const incrSpend    = Math.max(0, (snapAtEnd.spend||0)          - (snapBefore ? snapBefore.spend||0 : 0));
    const incrRevenue  = Math.max(0, (snapAtEnd.purchase_value||0) - (snapBefore ? snapBefore.purchase_value||0 : 0));
    const incrPurchases= Math.max(0, (snapAtEnd.purchases||0)      - (snapBefore ? snapBefore.purchases||0 : 0));
    const incrRoas     = incrSpend > 500 ? incrRevenue / incrSpend : (snapAtEnd.roas || 0);
    return { spend: incrSpend, purchases: incrPurchases, roas: incrRoas };
  }

  // 슬롯별 전체 합산 (진행 바 스케일 계산용)
  const slotTotals = slotDefs.map(slot => {
    let total = 0;
    uniqCampNames.forEach(n => { const d = getSlotData(n, slot); if (d) total += d.spend; });
    return total;
  });
  const maxSlotSpend = Math.max(...slotTotals, 1);

  const slotHeaders = slotDefs.map((s, i) =>
    `<th style="${i === currentSlotIdx ? 'color:var(--accent);' : ''}">${s.name}${i === currentSlotIdx ? ' ◀' : ''}</th>`
  ).join('');

  let campTimeRows;
  if (!todaySnaps.length) {
    campTimeRows = `<tr><td colspan="5" style="color:var(--muted);text-align:center;padding:24px;font-size:13px;">
      ⏳ 오늘 데이터 수집 중입니다.<br>
      <span style="font-size:11px;">매 시간 정각에 자동으로 업데이트됩니다.</span>
    </td></tr>`;
  } else {
    campTimeRows = uniqCampNames.map((name, ni) => {
      const cells = slotDefs.map((slot, si) => {
        const data = getSlotData(name, slot);
        const isCurrent = si === currentSlotIdx;
        if (!data) {
          const isFuture = currentSlotIdx >= 0 && si > currentSlotIdx;
          return `<td class="spend-cell" style="color:var(--muted);font-size:12px;opacity:${isFuture ? '0.3' : '1'};">-</td>`;
        }
        const roasCls = data.roas >= (goals.roas||2.5) ? 'rg' : data.roas >= 1.5 ? 'ry' : 'rr';
        const barW    = data.spend > 0 ? Math.min(100, Math.round(data.spend / maxSlotSpend * 100)) : 0;
        return `<td class="spend-cell${isCurrent ? ' current-slot' : ''}">
          <div class="cell-val">${wFmt(data.spend)}</div>
          <div style="height:3px;background:var(--surface3);border-radius:2px;margin:3px 0 4px;">
            <div style="height:100%;width:${barW}%;background:${campColors[ni%campColors.length]};border-radius:2px;"></div>
          </div>
          <div class="cell-sub2">${data.purchases}건 · <span class="${roasCls}">${data.roas.toFixed(1)}x</span></div>
        </td>`;
      }).join('');
      return `<tr>
        <td class="name-col">
          <span class="camp-name" title="${name}" style="max-width:130px;">
            <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${campColors[ni%campColors.length]};margin-right:6px;vertical-align:middle;"></span>${name}
          </span>
        </td>
        ${cells}
      </tr>`;
    }).join('') || `<tr><td colspan="5" style="color:var(--muted);text-align:center;padding:20px;">캠페인 데이터 없음</td></tr>`;
  }

  document.getElementById('main-content').outerHTML = `
  <div id="main-content" class="main">

    <!-- KPI -->
    <div class="kpi-grid">
      <div class="kpi-card selected" onclick="toggleCard(this,'roas')">
        <div class="sel-dot"></div>
        <div class="kpi-label">ROAS</div>
        <div class="kpi-value">${(today.roas||0).toFixed(2)}x</div>
        <div class="kpi-sub">${delta(today.roas, yesterday.roas, true)}${periodLabel ? `<span class="nt">${periodLabel}</span>` : ''}</div>
      </div>
      <div class="kpi-card selected" onclick="toggleCard(this,'cpa')">
        <div class="sel-dot"></div>
        <div class="kpi-label">CPA (결과당 비용)</div>
        <div class="kpi-value">${wFmt(today.cpa||0)}</div>
        <div class="kpi-sub">${delta(today.cpa, yesterday.cpa, false)}${periodLabel ? `<span class="nt">${periodLabel}</span>` : ''}</div>
      </div>
      <div class="kpi-card selected" onclick="toggleCard(this,'spend')">
        <div class="sel-dot"></div>
        <div class="kpi-label">총 지출</div>
        <div class="kpi-value">${wFmt(today.spend||0)}</div>
        <div class="kpi-sub">${delta(today.spend, yesterday.spend, false)}${periodLabel ? `<span class="nt">${periodLabel}</span>` : ''}</div>
      </div>
      <div class="kpi-card" onclick="toggleCard(this,'ctr')">
        <div class="sel-dot"></div>
        <div class="kpi-label">CTR (클릭률)</div>
        <div class="kpi-value">${(today.ctr||0).toFixed(2)}%</div>
        <div class="kpi-sub">${delta(today.ctr, yesterday.ctr, true)}${periodLabel ? `<span class="nt">${periodLabel}</span>` : ''}</div>
      </div>
      <div class="kpi-card" onclick="toggleCard(this,'cpm')">
        <div class="sel-dot"></div>
        <div class="kpi-label">CPM (1천 노출당 비용)</div>
        <div class="kpi-value">${wFmt(today.cpm||0)}</div>
        <div class="kpi-sub">${delta(today.cpm, yesterday.cpm, false)}${periodLabel ? `<span class="nt">${periodLabel}</span>` : ''}</div>
      </div>
    </div>

    <!-- 성과 추이 차트 -->
    <div class="chart-section">
      <div class="sec-hdr">
        <div class="sec-title">성과 추이 그래프${_useHourly ? ' <span style="font-size:11px;color:var(--accent);font-weight:400;margin-left:6px;">⏱ 시간별 누적 · 오늘</span>' : ''}</div>
        <div class="metric-toggles">
          <button class="mtog on"  data-m="roas"  onclick="toggleMetric(this)">ROAS</button>
          <button class="mtog on"  data-m="cpa"   onclick="toggleMetric(this)">CPA</button>
          <button class="mtog on"  data-m="spend" onclick="toggleMetric(this)">지출</button>
          <button class="mtog"     data-m="ctr"   onclick="toggleMetric(this)">CTR</button>
          <button class="mtog"     data-m="cpm"   onclick="toggleMetric(this)">CPM</button>
          <button class="mtog"     data-m="imp"   onclick="toggleMetric(this)">노출</button>
          <button class="mtog"     data-m="click" onclick="toggleMetric(this)">클릭</button>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
    </div>

    <!-- 캠페인별 시간대 광고비 -->
    <div class="time-spend-grid">
      <div class="ts-section">
        <div class="sec-hdr">
          <div class="sec-title">⏱ 캠페인별 오늘 시간대별 현황</div>
          <div style="font-size:11px;color:var(--muted)">
            ${todaySnaps.length > 0
              ? `실측 증분 데이터 · ${todaySnaps.length}회 수집 · ${currentSlotIdx >= 0 ? slotDefs[currentSlotIdx].name + ' 진행 중' : currentHour + '시 기준'}`
              : '수집 대기 중 · 매 시간 업데이트'}
          </div>
        </div>
        <div style="overflow-x:auto;">
          <table class="ts-table">
            <thead>
              <tr>
                <th class="name-col">캠페인</th>
                ${slotHeaders}
              </tr>
            </thead>
            <tbody>${campTimeRows}</tbody>
          </table>
        </div>
      </div>

      <!-- 금일 콘텐츠 TOP 리스트 -->
      <div class="ts-section">
        <div class="sec-hdr">
          <div class="sec-title">📊 금일 콘텐츠 TOP 리스트</div>
          <div style="font-size:11px;color:var(--muted);">컬럼 클릭 → 정렬 · ▲▼ 평균 대비</div>
        </div>
        <table class="ts-table" style="margin-top:14px;">
          <thead>
            <tr>
              <th class="name-col">콘텐츠명</th>
              <th id="ads-th-spend" style="cursor:pointer;user-select:none;" onclick="sortAdsTable('spend')">지출</th>
              <th id="ads-th-purchases" style="cursor:pointer;user-select:none;" onclick="sortAdsTable('purchases')">구매</th>
              <th id="ads-th-roas" style="cursor:pointer;user-select:none;" onclick="sortAdsTable('roas')">ROAS</th>
              <th id="ads-th-ctr" style="cursor:pointer;user-select:none;" onclick="sortAdsTable('ctr')">CTR</th>
              <th id="ads-th-cpm" style="cursor:pointer;user-select:none;" onclick="sortAdsTable('cpm')">CPM</th>
              <th id="ads-th-cpa" style="cursor:pointer;user-select:none;" onclick="sortAdsTable('cpa')">CPA</th>
            </tr>
          </thead>
          <tbody id="ads-tbody">
            <tr><td colspan="7" style="color:var(--muted);text-align:center;padding:20px;">로딩 중...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- 캠페인 상세 전체 테이블 -->
    <div class="table-section">
      <div class="sec-hdr"><div class="sec-title">캠페인 상세 성과 (${campPeriodLabel})</div></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>캠페인명</th><th>상태</th><th>노출</th><th>클릭</th>
              <th>CTR</th><th>CPM</th><th>지출</th><th>결과</th><th>CPA</th><th>ROAS</th>
            </tr>
          </thead>
          <tbody>${campRows}</tbody>
        </table>
      </div>
    </div>

    <!-- 향후 플랫폼 -->
    <div class="soon-row">
      <div class="soon-banner">🟡 <strong>카카오 비즈니스</strong> 연동 준비중 <span class="badge-soon">SOON</span></div>
      <div class="soon-banner">🎵 <strong>TikTok Ads</strong> 연동 준비중 <span class="badge-soon">SOON</span></div>
    </div>

  </div>`;

  // 차트 그리기
  function buildDS() {
    return activeMetrics.map(k => ({
      label: dsMap[k].label, data: dsMap[k].data,
      borderColor: dsMap[k].color, backgroundColor: dsMap[k].color+'22',
      tension: .4, fill: false, pointRadius: 4, yAxisID: dsMap[k].y,
    }));
  }

  if (mainChart) mainChart.destroy();
  const ctx = document.getElementById('mainChart').getContext('2d');
  mainChart = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets: buildDS() },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { labels: { color: '#8892b0', boxWidth: 12 } } },
      scales: {
        x:  { ticks: { color: '#8892b0' }, grid: { color: 'rgba(46,50,80,.5)' } },
        y1: { position: 'left',  ticks: { color: '#8892b0' }, grid: { color: 'rgba(46,50,80,.5)' } },
        y2: { position: 'right', ticks: { color: '#8892b0' }, grid: { display: false } },
      }
    }
  });

  window._dsMap  = dsMap;
  window._labels = labels;
  window._chart  = mainChart;

  // 금일 콘텐츠 TOP 리스트 - 정렬/화살표 지원
  _adsCache = ads;
  _adsGoals = goals;
  renderAdsTable();

  const upd = document.getElementById('last-updated');
  if (upd) upd.innerHTML = `<span class="pulse"></span>업데이트 <span>${s.last_updated_kst||'방금'}</span>`;
}

function toggleMetric(btn) {
  const m = btn.dataset.m;
  if (btn.classList.contains('on')) {
    if (activeMetrics.length <= 1) return;
    activeMetrics = activeMetrics.filter(x => x !== m);
    btn.classList.remove('on');
  } else {
    activeMetrics.push(m);
    btn.classList.add('on');
  }
  if (window._chart) {
    window._chart.data.datasets = activeMetrics.map(k => ({
      label: window._dsMap[k].label, data: window._dsMap[k].data,
      borderColor: window._dsMap[k].color, backgroundColor: window._dsMap[k].color+'22',
      tension: .4, fill: false, pointRadius: 4, yAxisID: window._dsMap[k].y,
    }));
    window._chart.update();
  }
}

function toggleCard(card, metric) {
  card.classList.toggle('selected');
  const btn = document.querySelector(`.mtog[data-m="${metric}"]`);
  if (btn) btn.click();
}

function sortAdsTable(key) {
  if (adsSortKey === key) {
    adsSortDir = adsSortDir === 'desc' ? 'asc' : 'desc';
  } else {
    adsSortKey = key;
    adsSortDir = 'desc';
  }
  renderAdsTable();
}

function renderAdsTable() {
  const adsBody = document.getElementById('ads-tbody');
  if (!adsBody) return;

  // 정렬 방향 표시 업데이트
  const cols = ['spend','purchases','roas','ctr','cpm','cpa'];
  cols.forEach(col => {
    const th = document.getElementById('ads-th-' + col);
    if (!th) return;
    const labels = { spend:'지출', purchases:'구매', roas:'ROAS', ctr:'CTR', cpm:'CPM', cpa:'CPA' };
    if (col === adsSortKey) {
      th.innerHTML = labels[col] + ' ' + (adsSortDir === 'desc' ? '↓' : '↑');
      th.style.color = 'var(--accent)';
    } else {
      th.innerHTML = labels[col];
      th.style.color = '';
    }
  });

  if (!_adsCache || _adsCache.length === 0) {
    adsBody.innerHTML = '<tr><td colspan="7" style="color:var(--muted);text-align:center;padding:20px;">광고 데이터가 없습니다.</td></tr>';
    return;
  }

  // 정렬
  const sorted = [..._adsCache].sort((a, b) => {
    const av = a[adsSortKey] || 0, bv = b[adsSortKey] || 0;
    return adsSortDir === 'desc' ? bv - av : av - bv;
  });

  // 평균 계산 (화살표 색상 기준)
  const avg = {};
  cols.forEach(k => {
    const vals = _adsCache.map(x => x[k] || 0).filter(v => v > 0);
    avg[k] = vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : 0;
  });

  // 지표별 "높을수록 좋은가"
  const higherIsBetter = { spend: true, purchases: true, roas: true, ctr: true, cpm: false, cpa: false };

  function arrow(val, key) {
    if (!avg[key] || avg[key] === 0) return '';
    const isHigher = val > avg[key];
    const good = higherIsBetter[key] ? isHigher : !isHigher;
    const sym  = isHigher ? '▲' : '▼';
    const color = good ? 'var(--green)' : 'var(--red)';
    return `<span style="font-size:10px;color:${color};margin-left:3px;">${sym}</span>`;
  }

  adsBody.innerHTML = sorted.map((ad, i) => {
    const adName    = ad.ad_name || `광고 ${i+1}`;
    const spend     = ad.spend     || 0;
    const purchases = ad.purchases || 0;
    const roas      = ad.roas      || 0;
    const ctr       = ad.ctr       || 0;
    const cpm       = ad.cpm       || 0;
    const cpa       = ad.cpa       || 0;
    const displayName = adName.length > 20 ? adName.slice(0,20)+'…' : adName;
    return `<tr>
      <td class="name-col"><span class="camp-name" title="${adName}">${displayName}</span></td>
      <td>${wFmt(spend)}${arrow(spend,'spend')}</td>
      <td>${purchases}건${arrow(purchases,'purchases')}</td>
      <td>${roas.toFixed(2)}x${arrow(roas,'roas')}</td>
      <td>${ctr.toFixed(2)}%${arrow(ctr,'ctr')}</td>
      <td>${wFmt(cpm)}${arrow(cpm,'cpm')}</td>
      <td>${wFmt(cpa)}${arrow(cpa,'cpa')}</td>
    </tr>`;
  }).join('');
}

async function loadData() {
  try {
    const [s, d, c, a, h, p, g] = await Promise.all([
      fetch(`${RAW}/summary.json?t=${Date.now()}`).then(r => r.json()),
      fetch(`${RAW}/daily_history.json?t=${Date.now()}`).then(r => r.json()),
      fetch(`${RAW}/campaigns.json?t=${Date.now()}`).then(r => r.json()),
      fetch(`${RAW}/ads.json?t=${Date.now()}`).then(r => r.json()).catch(() => ({data:[]})),
      fetch(`${RAW}/hourly_snapshots.json?t=${Date.now()}`).then(r => r.json()).catch(() => ({snapshots:[]})),
      fetch(`${RAW}/period_campaigns.json?t=${Date.now()}`).then(r => r.json()).catch(() => null),
      fetch(`${RAW}/goals.json?t=${Date.now()}`).then(r => r.json()).catch(() => null),
    ]);
    render(s, d, c, a, h, p, g);
  } catch(e) {
    document.getElementById('main-content').innerHTML =
      `<div class="loading" style="color:var(--red)">
        ⚠ 데이터를 불러오지 못했습니다.<br>
        <small style="color:var(--muted)">${e.message}</small><br><br>
        <button onclick="loadData()" style="background:var(--accent);border:none;color:#fff;padding:8px 20px;border-radius:8px;cursor:pointer;font-size:13px;">다시 시도</button>
      </div>`;
  }
}

loadData();
checkAndHideYesterdayData();
setInterval(loadData, 60 * 60 * 1000);
setInterval(checkAndHideYesterdayData, 60 * 60 * 1000);
</script>

.act-timeline-wrap { overflow-y: auto; flex: 1; padding: 8px 24px 20px; }

.act-evt-icon { font-size: 16px; width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

.act-st-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; flex-shrink: 0; }
.act-st-badge.on   { background: rgba(34,197,94,.18);  color: #22c55e; }
.act-st-badge.off  { background: rgba(239,68,68,.18);  color: #ef4444; }

.act-st-badge.down { background: rgba(245,158,11,.18); color: #f59e0b; }
.act-st-badge.edit { background: rgba(136,146,176,.15);color: #8892b0; }

.act-evt-detail .chg-arrow { color: var(--accent); font-weight: 700; margin: 0 4px; }

.act-actor { font-size: 11px; color: var(--muted); }
.act-actor::before { content: '·'; margin-right: 4px; }
.act-empty { text-align: center; color: var(--muted); font-size: 14px; padding: 56px 0; }
</style>

<!-- 운영 이력 모달 -->
<div class="act-overlay" id="actOverlay" onclick="actCloseOutside(event)">
  <div class="act-modal" id="actModal">
    <div class="act-hdr">
      <div class="act-hdr-left">
        <span class="act-title">📋 운영 이력</span>
        <div class="act-date-range">
          <input type="date" id="actFrom" onchange="renderActTimeline()">
          <span class="act-date-sep">~</span>
          <input type="date" id="actTo" onchange="renderActTimeline()">
        </div>
      </div>
      <button class="act-close-btn" onclick="closeActivityModal()">✕</button>
    </div>
    <div class="act-filter-bar">
      <div class="act-level-tabs">
        <button class="act-ltab active" data-lv="all"      onclick="setActLevel('all')">전체</button>
        <button class="act-ltab"        data-lv="campaign" onclick="setActLevel('campaign')">캠페인</button>
        <button class="act-ltab"        data-lv="adset"    onclick="setActLevel('adset')">광고세트</button>
        <button class="act-ltab"        data-lv="ad"       onclick="setActLevel('ad')">광고</button>
      </div>
    </div>
    <div class="act-stats" id="actStats"></div>
    <div class="act-timeline-wrap" id="actTimeline"><div class="act-empty">불러오는 중...</div></div>
  </div>
</div>

<script>
// ── 운영 이력 팝업 ──────────────────────────────
let _actEvents = [];
let _actLevel  = 'all';

function openActivityModal() {
  const today    = new Date();
  const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
  const fmt = d => d.toISOString().slice(0, 10);
  const fromEl = document.getElementById('actFrom');
  const toEl   = document.getElementById('actTo');
  if (!fromEl.value) fromEl.value = fmt(firstDay);
  if (!toEl.value)   toEl.value   = fmt(today);
  document.getElementById('actOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  fetchActData();
}
function closeActivityModal() {
  document.getElementById('actOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
function actCloseOutside(e) {
  if (e.target === document.getElementById('actOverlay')) closeActivityModal();
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeActivityModal(); });

async function fetchActData() {
  try {
    const r = await fetch(RAW + '/activity_log.json?t=' + Date.now());
    const d = await r.json();
    _actEvents = d.events || [];
  } catch(_) { _actEvents = []; }
  renderActTimeline();
}
function setActLevel(lv) {
  _actLevel = lv;
  document.querySelectorAll('.act-ltab').forEach(b => b.classList.toggle('active', b.dataset.lv === lv));
  renderActTimeline();
}
function renderActTimeline() {
  const from = document.getElementById('actFrom').value;
  const to   = document.getElementById('actTo').value;
  let evts = _actEvents.filter(e => {
    const d = e.event_time.slice(0, 10);
    if (from && d < from) return false;
    if (to   && d > to)   return false;
    if (_actLevel !== 'all') {
      const t = (e.object_type || '').toLowerCase();
      if (_actLevel === 'campaign' && !t.includes('campaign')) return false;
      if (_actLevel === 'adset'    && !t.includes('adset') && !t.includes('ad_set')) return false;
      if (_actLevel === 'ad') {
        if (t.includes('campaign') || t.includes('adset') || t.includes('ad_set')) return false;
      }
    }
    return true;
  });
  const total  = evts.length;
  const onCnt  = evts.filter(e => e.category === 'status_on').length;
  const offCnt = evts.filter(e => e.category === 'status_off').length;
  const budCnt = evts.filter(e => e.category === 'budget_up' || e.category === 'budget_down').length;
  document.getElementById('actStats').innerHTML =
    '<div class="act-stat"><div class="act-stat-num">' + total + '</div><div class="act-stat-label">전체 변경</div></div>' +
    '<div class="act-stat"><div class="act-stat-num" style="color:var(--green)">' + onCnt + '</div><div class="act-stat-label">ON 전환</div></div>' +
    '<div class="act-stat"><div class="act-stat-num" style="color:var(--red)">' + offCnt + '</div><div class="act-stat-label">OFF 전환</div></div>' +
    '<div class="act-stat"><div class="act-stat-num" style="color:var(--accent)">' + budCnt + '</div><div class="act-stat-label">예산 변경</div></div>';
  if (!evts.length) {
    document.getElementById('actTimeline').innerHTML = '<div class="act-empty">해당 기간 운영 이력이 없습니다.</div>';
    return;
  }
  const byDate = {};
  evts.forEach(e => { const d = e.event_time.slice(0,10); (byDate[d] = byDate[d]||[]).push(e); });
  let html = '';
  Object.keys(byDate).sort().reverse().forEach(date => {
    html += '<div class="act-date-divider">' + date.replace(/-/g,'.') + '</div>';
    byDate[date].forEach(e => {
      const info   = _actInfo(e.category);
      const time   = e.event_time.slice(11,16);
      const lvl    = _actLvl(e.object_type);
      const detail = _actDetail(e.extra);
      html += '<div class="act-event">' +
        '<div class="act-evt-icon ' + info.cls + '">' + info.icon + '</div>' +
        '<div class="act-evt-body">' +
          '<div class="act-evt-top">' +
            '<span class="act-lvl-badge">' + lvl + '</span>' +
            '<span class="act-obj-name">' + (e.object_name || e.object_id || '-') + '</span>' +
            '<span class="act-st-badge ' + info.cls + '">' + info.label + '</span>' +
          '</div>' +
          (detail ? '<div class="act-evt-detail">' + detail + '</div>' : '') +
          '<div class="act-evt-meta">' +
            '<span class="act-time">' + time + '</span>' +
            (e.actor_name ? '<span class="act-actor">' + e.actor_name + '</span>' : '') +
          '</div>' +
        '</div>' +
      '</div>';
    });
  });
  document.getElementById('actTimeline').innerHTML = html;
}
function _actInfo(cat) {
  if (cat === 'status_on')   return { icon:'🟢', cls:'on',   label:'ON' };
  if (cat === 'status_off')  return { icon:'🔴', cls:'off',  label:'OFF' };
  if (cat === 'budget_up')   return { icon:'📈', cls:'up',   label:'예산 증액' };
  if (cat === 'budget_down') return { icon:'📉', cls:'down', label:'예산 감소' };
  return { icon:'✏️', cls:'edit', label:'수정' };
}
function _actLvl(type) {
  const t = (type||'').toLowerCase();
  if (t.includes('campaign')) return '캠페인';
  if (t.includes('adset') || t.includes('ad_set')) return '광고세트';
  if (t.includes('ad')) return '광고';
  return type || '-';
}
function _actDetail(x) {
  if (!x) return '';
  const oldV = x.old_value !== undefined ? x.old_value : (x.old_budget !== undefined ? x.old_budget : null);
  const newV = x.new_value !== undefined ? x.new_value : (x.new_budget !== undefined ? x.new_budget : null);
  if (oldV !== null && newV !== null && String(oldV) !== String(newV)) {
    const fmt = v => { const n = parseFloat(v); return (!isNaN(n) && n > 999) ? n.toLocaleString() + '원' : String(v); };
    return fmt(oldV) + '<span class="chg-arrow">→</span>' + fmt(newV);
  }
  return '';
}
</script>
