name: 이어리프트 Meta 광고 데이터 수집

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install requests

      - name: Meta API 데이터 수집
        env:
          META_ACCESS_TOKEN:  ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          META_APP_ID:        ${{ secrets.META_APP_ID }}
          META_APP_SECRET:    ${{ secrets.META_APP_SECRET }}
        run: python scripts/collect_data.py

      - name: 데이터 파일 커밋 & 푸시
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add data/
          if git diff --staged --quiet; then
            echo '변경없음'
          else
            git commit -m '데이터 업데이트'
                        git pull --rebase origin main
            git push
          fi
